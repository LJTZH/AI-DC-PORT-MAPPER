# 自定义线缆标准长度配置（可选）
# 如果不指定此文件，系统使用内置默认长度
# 计算长度会向上取整到最近的标准长度

cable_lengths:
  DAC:    [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 5.0]
  AOC:    [1.0, 3.0, 5.0, 7.0, 10.0, 15.0, 20.0, 25.0, 30.0]
  Fiber:  [1.0, 2.0, 3.0, 5.0, 10.0, 15.0, 20.0, 25.0, 30.0, 50.0, 100.0]
  Copper: [0.5, 1.0, 2.0, 3.0, 5.0, 7.0, 10.0, 15.0, 20.0, 25.0, 30.0]
